developer_instructions = """
# HƯỚNG DẪN DÀNH CHO AGENT: QUY TRÌNH TIẾP NHẬN TÍNH NĂNG (FEATURE INTAKE SYSTEM)

## 1. TỔNG QUAN & MỤC TIÊU
Mọi yêu cầu triển khai (implementation prompt) hoặc đặc tả dự án mới (project spec) BẮT BUỘC phải đi qua cổng tiếp nhận (Intake Gate) này trước khi tiến hành thay đổi mã nguồn hoặc chuyển đổi thành tài liệu sản phẩm (product docs), story, hay tác vụ triển khai.

> **NGUYÊN TẮC CỐT LÕI:** Người dùng không cần tự đánh giá mức độ rủi ro. Nhiệm vụ của bạn (Agent) là tự động phân loại, đánh giá rủi ro và điều hướng luồng công việc vào "làn đường" (lane) phù hợp.

---

## 2. LUỒNG XỬ LÝ (INTAKE FLOW)
Thực hiện phân tích theo trình tự tuyến tính sau đối với mọi đầu vào:

1. **Phân tích đầu vào:** Nhận `User prompt` -> Xác định Loại hình đầu vào (Input Type).
2. **Làm rõ yêu cầu:** Tái cấu trúc cấu trúc yêu cầu thành một Hạng mục công việc (Work item) cụ thể.
3. **Tra cứu ngữ cảnh:** Xác định các tài liệu sản phẩm (product docs) và story hiện có bị ảnh hưởng.
4. **Đánh giá rủi ro:** Chạy bộ kiểm tra rủi ro (Risk Checklist) để quét các điểm nhạy cảm.
5. **Điều hướng:** Quyết định làn đường xử lý phù hợp (`Tiny`, `Normal`, hoặc `High-Risk`).

---

## 3. PHÂN LOẠI LOẠI HÌNH ĐẦU VÀO (INPUT TYPES)
Dựa vào bản chất của yêu cầu để xác định loại hình đầu vào, từ đó định hình sản phẩm đầu ra (artifact) trước khi đánh giá rủi ro.

| Loại hình (Type) | Trường hợp áp dụng (Use when) | Thành phẩm đặc trưng (Typical artifact) |
| :--- | :--- | :--- |
| **New spec** | Chuyển đổi một đặc tả dự án thô từ người dùng thành tài liệu sẵn sàng triển khai. | Product docs, candidate epics, decisions |
| **Spec slice** | Triển khai một nhánh hành vi cụ thể từ một spec đã được phê duyệt. | Story packet |
| **Change request** | Thay đổi, sửa lỗi (fix) hoặc tinh chỉnh một hành vi đã được chấp nhận trước đó. | Story packet hoặc direct patch |
| **New initiative** | Thêm một phân hệ sản phẩm lớn, cần chia nhỏ thành nhiều câu chuyện (stories). | Initiative notes kèm theo story packets |
| **Maintenance request** | Thay đổi liên quan đến kỹ thuật, vận hành, hoặc cập nhật thư viện/dependency. | Story packet, validation report, hoặc decision |
| **Harness improvement** | Cải tiến quy trình cộng tác giữa con người và AI agent. | Direct docs update hoặc `docs/HARNESS_BACKLOG.md` |

> **⚠️ NGUYÊN TẮC QUẢN LÝ TÀI LIỆU:** Tuyệt đối **KHÔNG** tạo mới hoặc mở rộng các bộ Spec nguyên khối (monolithic spec) một cách tùy tiện sau quy trình intake. Hãy sử dụng hệ thống tài liệu động: product docs, stories, decisions, và initiative notes làm bề mặt cộng tác chính.

---

## 4. BỘ KIỂM TRA RỦI RO (RISK CHECKLIST)
Duyệt qua danh sách dưới đây và đánh dấu (flag) cho mỗi hạng mục bị ảnh hưởng bởi yêu cầu:

| Mã rủi ro (Risk flag) | Phạm vi ảnh hưởng (Applies when the work touches) |
| :--- | :--- |
| **Auth** | Đăng nhập, đăng xuất, phiên làm việc (sessions), JWT, mật khẩu, refresh token. |
| **Authorization** | Phân quyền, vai trò (roles), phạm vi tenant hoặc phạm vi công ty (company scope). |
| **Data model** | Cấu trúc cơ sở dữ liệu (schema), migrations, ràng buộc duy nhất (uniqueness), xóa dữ liệu, lưu trữ (retention). |
| **Audit/security** | Nhật ký hệ thống (audit logs), bảo mật quyền riêng tư, dữ liệu nhạy cảm, access logs. |
| **External systems** | Gửi email, cổng thanh toán, dịch vụ cloud, SDK của bên thứ ba, hàng đợi (queues), webhooks. |
| **Public contracts** | Cấu trúc API (API shape), response envelope, các hành vi mà phía client có thể nhìn thấy công khai. |
| **Cross-platform** | Tách biệt logic Desktop/Mobile/Browser, hành vi shell native, deep links. |
| **Existing behavior** | Thay đổi các hành vi/tính năng đã được triển khai hoặc đã được bao phủ bởi test case. |
| **Weak proof** | Vùng code bị ảnh hưởng chưa có kiểm thử (tests) rõ ràng hoặc bị thiếu test. |
| **Multi-domain** | Thay đổi đồng thời nhiều hơn một domain sản phẩm cùng một lúc. |

---

## 5. QUY TẮC PHÂN LÀN (LANE CLASSIFICATION)

### Luồng Logic Phân Loại (Decision Tree)
* **Có từ 0 - 1 flag:** Phân vào làn **Tiny** hoặc **Normal** (tùy thuộc vào mức độ tác động của code).
* **Có từ 2 - 3 flags:** Phân vào làn **Normal** (yêu cầu tăng cường các bước kiểm thử/validation).
* **Có từ 4 flags trở lên OR dính Hard Gate:** Bắt buộc phân vào làn **High-Risk**.

### Danh sách các Cổng Kiểm Soát Nghiêm Ngặt (Hard Gates):
Nếu chạm vào bất kỳ điểm nào dưới đây, yêu cầu tự động cấu hình là **High-Risk** (trừ khi con người chủ động thu hẹp phạm vi - narrow scope):
* Tính năng Auth hoặc Authorization.
* Nguy cơ mất mát dữ liệu hoặc thực hiện Migration dữ liệu.
* Đụng chạm tới Audit/Security.
* Thay đổi hành vi của nhà cung cấp bên thứ ba (External provider).
* Gỡ bỏ hoặc làm giảm nhẹ các yêu cầu kiểm thử hiện có (Validation requirements).

---

## 6. TIÊU CHUẨN THỰC THI CHO TỪNG LÀN ĐƯỜNG

### 🏎️ Làn TINY (Rủi ro thấp)
*Áp dụng:* Thay đổi tài liệu, sửa copy/text, đổi tên biến, hoặc chỉnh sửa phạm vi cực hẹp.
* **Yêu cầu:**
  - Tạo patch trực tiếp.
  - Cập nhật các tài liệu bị ảnh hưởng ngay lập tức để đảm bảo tính đồng bộ.
  - Chạy các bộ kiểm tra nhanh (quick checks) có sẵn.
  - Chỉ cập nhật hệ thống harness nếu phát hiện xung đột/ma sát (friction).

### 🚗 Làn NORMAL (Rủi ro trung bình)
*Áp dụng:* Các tính năng có kích thước tương đương một User Story, bán kính ảnh hưởng (blast radius) có giới hạn.
* **Yêu cầu:**
  - Tạo mới hoặc cập nhật chính xác một file story từ mẫu `docs/templates/story.md`.
  - Liên kết đầy đủ các tài liệu sản phẩm liên quan.
  - Thêm hoặc cập nhật các kỳ vọng kiểm thử (validation expectations).
  - Triển khai phân đoạn dọc nhỏ nhất (smallest vertical slice) nếu đã có nền tảng triển khai trước đó.
  - Cập nhật file ma trận kiểm thử `docs/TEST_MATRIX.md`.

### 🚨 Làn HIGH-RISK (Rủi ro cao)
*Áp dụng:* Ảnh hưởng tới bảo mật, toàn vẹn dữ liệu, phạm vi hệ thống, hợp đồng cam kết, hoặc tác động đến nhiều vai trò/nền tảng.
* **Yêu cầu:**
  - Tạo một thư mục story riêng biệt theo mẫu `docs/templates/high-risk-story/`.
  - Hoàn thiện bắt buộc các file: `execplan.md`, `overview.md`, `design.md`, và `validation.md`.
  - **BẮT BUỘC** yêu cầu con người xác nhận (human confirmation) trước khi viết code nếu định hướng yêu cầu bị mơ hồ.
  - Ghi lại biên bản quyết định (Record a decision) khi hành vi hệ thống hoặc kiến trúc thay đổi một cách trọng yếu.

---

## 7. ĐỊNH DẠNG ĐẦU RA CHUẨN (OUTPUT SPECIFICATION)
Khi kết thúc quy trình Intake, bạn phải trả về kết quả cấu trúc chính xác theo biểu mẫu dưới đây (Ví dụ minh họa):

```text
Lane: normal
Reason: touches authorization, API contract, and audit behavior.
Docs: permissions, account-settings, audit-log.
Story: docs/stories/epics/E02-access-control/US-014-manager-updates-role.md.
Validation: unit, integration, E2E.
```
